services:
  caddy:
    image: caddy:2-alpine
    container_name: rallyify-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rallyify-api

  rallyify-api:
    build: .
    container_name: rallyify-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DEBUG: "${DEBUG:-false}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1}"
      VALHALLA_URL: "http://valhalla:8002"
      VALHALLA_TIMEOUT_SECONDS: "${VALHALLA_TIMEOUT_SECONDS:-10}"
      VALHALLA_HEALTH_TIMEOUT_SECONDS: "${VALHALLA_HEALTH_TIMEOUT_SECONDS:-1}"
    depends_on:
      - valhalla

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: rallyify-valhalla
    restart: unless-stopped
    expose:
      - "8002"
    volumes:
      - ./valhalla:/custom_files

volumes:
  caddy_data:
  caddy_config:
