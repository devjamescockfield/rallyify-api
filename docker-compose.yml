services:
  caddy:
    image: caddy:2-alpine
    container_name: rallyify-caddy
    restart: unless-stopped
    # Public edge: Caddy is the only service that should publish host ports.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rallyify-api

  rallyify-api:
    build: .
    container_name: rallyify-api
    restart: unless-stopped
    # Internal-only: Caddy reaches the API at http://rallyify-api:8000.
    # Do not add a ports: mapping here for staging.
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DEBUG: "${DEBUG:-false}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1}"
      VALHALLA_URL: "http://valhalla:8002"
      VALHALLA_TIMEOUT_SECONDS: "${VALHALLA_TIMEOUT_SECONDS:-10}"
      VALHALLA_HEALTH_TIMEOUT_SECONDS: "${VALHALLA_HEALTH_TIMEOUT_SECONDS:-1}"
    depends_on:
      - valhalla

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    container_name: rallyify-valhalla
    restart: unless-stopped
    # Internal-only: do not add a ports: mapping for 8002 in staging.
    # The API reaches this service through http://valhalla:8002.
    expose:
      - "8002"
    volumes:
      # Put united-kingdom-latest.osm.pbf and generated Valhalla files here.
      - /data/valhalla/custom_files:/custom_files

volumes:
  caddy_data:
  caddy_config:
